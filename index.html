<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đề cương ôn tập — Nghiên cứu thị trường quốc tế</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Sử dụng bộ font chuẩn phong cách Techno/Developer -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  /* Bảng màu Dark Techno / Webflow Developer */
  --bg-body: #09090b;       /* Đen sâu */
  --bg-card: #121214;       /* Xám đen cho thẻ */
  --bg-hover: #18181b;      
  --bg-highlight: #1e1e24;  
  
  --text-main: #e4e4e7;     /* Trắng sáng */
  --text-muted: #a1a1aa;    /* Xám thép */
  --text-primary: #00e5ff;  /* Xanh Neon Cyan - Điểm nhấn techno */
  
  --border-light: #27272a;
  --border-focus: #00e5ff;
  
  --exam-bg: transparent;
  --exam-text: #ff3366;     /* Đỏ dạ quang cho tag Thi */
  
  /* Bắt buộc hình vuông (0px) theo yêu cầu */
  --radius-sm: 0px;
  --radius-md: 0px;
  --radius-lg: 0px;
  
  /* Typography */
  --font-main: 'Inter', sans-serif;
  --font-heading: 'Space Grotesk', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

* { 
  box-sizing: border-box; 
  margin: 0; 
  padding: 0; 
}

body { 
  font-family: var(--font-main); 
  background-color: var(--bg-body);
  color: var(--text-main);
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  
  /* Nền họa tiết lưới kỹ thuật số (Grid Pattern) */
  background-image: 
    linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
  background-size: 32px 32px;
}

.container { 
  padding: 4rem 1.5rem; 
  max-width: 860px; 
  margin: 0 auto; 
  position: relative;
  z-index: 1;
}

/* Header Styles - Tech Terminal Vibe */
.header { 
  margin-bottom: 3.5rem; 
  text-align: left;
  background: rgba(18, 18, 20, 0.85);
  backdrop-filter: blur(12px);
  padding: 2.5rem;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border-light);
  border-top: 4px solid var(--text-primary); /* Vạch kẻ trên cùng */
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
}

.header h1 { 
  font-family: var(--font-heading);
  font-size: 26px; 
  font-weight: 700; 
  color: #ffffff; 
  margin-bottom: 12px; 
  text-transform: uppercase;
  letter-spacing: -0.02em;
}

.header p { 
  font-size: 15px; 
  color: var(--text-muted); 
  margin-bottom: 24px;
}

.progress { 
  display: flex; 
  gap: 12px; 
  align-items: center; 
  flex-wrap: wrap; 
}

/* Nút bấm (Buttons) vuông vức, viền sắc nét */
.prog-pill { 
  font-family: var(--font-mono);
  font-size: 13px; 
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 10px 20px; 
  border-radius: var(--radius-sm); 
  background: transparent;
  border: 1px solid var(--text-muted); 
  color: var(--text-muted); 
  cursor: pointer; 
  transition: all 0.15s ease-out; /* Chuyển động nhanh, dứt khoát */
}

.prog-pill:hover { 
  background: rgba(0, 229, 255, 0.05); 
  border-color: var(--text-primary);
  color: var(--text-primary);
  /* Hiệu ứng đổ bóng vuông (Brutalist tech shadow) */
  box-shadow: -3px 3px 0 rgba(0, 229, 255, 0.2);
  transform: translate(2px, -2px);
}

.prog-pill:active {
  transform: translate(0, 0);
  box-shadow: none;
}

/* Chapter Card Styles - Hình vuông, đường viền nét */
.chapter { 
  margin-bottom: 1.5rem; 
  background: var(--bg-card);
  border: 1px solid var(--border-light); 
  border-radius: var(--radius-lg); 
  transition: all 0.2s ease-out;
  position: relative; /* Bắt buộc để chứa viền sáng */
}

/* Hiệu ứng Vercel Spotlight Border */
.chapter::before {
  content: "";
  position: absolute;
  inset: -1px; /* Phủ tràn ra mép viền cũ */
  padding: 1px; /* Độ dày của viền sáng */
  border-radius: inherit;
  /* Vùng sáng chạy theo tọa độ x, y của chuột */
  background: radial-gradient(
    800px circle at var(--mouse-x, 0) var(--mouse-y, 0),
    var(--text-primary),
    transparent 40%
  );
  /* Kỹ thuật Mask đục thủng ruột thẻ, chỉ để lại border */
  -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  opacity: 0.15; /* Sáng mờ kể cả khi chưa hover (đúng chuẩn Vercel) */
  transition: opacity 0.4s ease;
  pointer-events: none;
  z-index: 10;
}

.chapter:hover {
  border-color: transparent; /* Ẩn viền tĩnh đi để viền sáng thay thế */
  box-shadow: -4px 4px 0 rgba(0, 229, 255, 0.15);
  transform: translate(2px, -2px);
}

.chapter:hover::before {
  opacity: 1; /* Sáng rực rỡ khi di chuột vào chính nó */
}

.chapter-header { 
  padding: 20px 24px; 
  display: flex; 
  align-items: center; 
  gap: 16px; 
  cursor: pointer; 
  user-select: none; 
  background: var(--bg-card); 
  transition: background 0.3s ease;
}

.chapter-header:hover { 
  background: var(--bg-hover); 
}

.ch-badge { 
  font-family: var(--font-mono);
  font-size: 12px; 
  font-weight: 700; 
  padding: 6px 12px; 
  border-radius: var(--radius-sm); 
  white-space: nowrap; 
  letter-spacing: 0.5px;
  text-transform: uppercase;
  /* Đổ bóng khối cho badge để hòa hợp với tông màu data */
  box-shadow: -2px 2px 0 rgba(255, 255, 255, 0.15);
}

.ch-title { 
  font-family: var(--font-heading);
  font-size: 18px; 
  font-weight: 700; 
  color: #ffffff; 
  flex: 1; 
  letter-spacing: 0.01em;
}

.ch-arrow { 
  font-size: 14px; 
  color: var(--text-muted); 
  transition: transform 0.2s ease-out; 
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  background: transparent;
  border: 1px solid var(--border-light);
  border-radius: 0;
}

.ch-arrow.open { 
  transform: rotate(90deg); 
  border-color: var(--text-primary);
  color: var(--text-primary);
}

/* Chapter Body & Keys */
.chapter-body { 
  display: none; 
  padding: 0 24px 24px 24px; 
  background: var(--bg-card); 
  border-top: 1px solid var(--border-light);
}

.chapter-body.open { 
  display: block; 
}

.section-label { 
  font-family: var(--font-mono);
  font-size: 12px; 
  font-weight: 700; 
  text-transform: uppercase; 
  letter-spacing: 0.15em; 
  color: var(--text-primary); 
  margin-bottom: 14px; 
  margin-top: 28px; 
  display: flex;
  align-items: center;
}

.section-label::after {
  content: "";
  flex: 1;
  height: 2px;
  /* Đường đứt nét kỹ thuật số */
  background: repeating-linear-gradient(90deg, var(--border-light), var(--border-light) 4px, transparent 4px, transparent 8px);
  margin-left: 16px;
}

.section-label:first-child { 
  margin-top: 24px; 
}

.key-content { 
  background: var(--bg-highlight); 
  border-left: 3px solid var(--text-primary); /* Sọc dọc techno */
  border-radius: var(--radius-sm); 
  padding: 18px 24px; 
  margin-bottom: 24px; 
  font-size: 15px; 
  color: var(--text-main); 
}

.key-content ul { 
  padding-left: 20px; 
}

.key-content li { 
  margin-bottom: 8px; 
}
.key-content li:last-child { margin-bottom: 0; }

/* Questions Styles */
.q-item { 
  border: 1px solid var(--border-light); 
  border-radius: var(--radius-sm); 
  margin-bottom: 12px; 
  background: transparent;
  transition: all 0.2s ease-out;
  position: relative;
}

/* Vercel Spotlight Border Effect cho các item câu hỏi */
.q-item::before {
  content: "";
  position: absolute;
  inset: -1px;
  padding: 1px;
  border-radius: inherit;
  background: radial-gradient(
    600px circle at var(--mouse-x, 0) var(--mouse-y, 0),
    var(--text-primary),
    transparent 40%
  );
  -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  opacity: 0; /* Mặc định ẩn để không bị quá chói, chỉ bật khi hover */
  transition: opacity 0.4s ease;
  pointer-events: none;
  z-index: 10;
}

.q-item:hover {
  border-color: transparent;
  transform: translateX(4px);
  /* Thanh trượt dạ quang bên trái khi hover */
  box-shadow: -4px 0 0 var(--text-primary);
}

.q-item:hover::before {
  opacity: 1;
}

.q-header { 
  padding: 16px 20px; 
  display: flex; 
  gap: 14px; 
  cursor: pointer; 
  background: rgba(255, 255, 255, 0.01); 
  align-items: flex-start;
}

.q-num { 
  font-family: var(--font-mono);
  font-size: 14px; 
  font-weight: 700; 
  color: var(--text-primary); 
  min-width: 24px; 
  margin-top: 2px;
}

.q-text { 
  font-size: 15px; 
  font-weight: 500;
  color: #ffffff; 
  flex: 1; 
  line-height: 1.6;
}

.q-toggle { 
  font-family: var(--font-mono);
  font-size: 18px; 
  font-weight: 400;
  color: var(--text-muted); 
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.q-answer { 
  display: none; 
  padding: 20px 20px 24px 58px; 
  border-top: 1px solid var(--border-light); 
  background: rgba(0, 0, 0, 0.2); 
  font-size: 14.5px; 
  color: #d4d4d8; 
}

.q-answer.open { 
  display: block; 
}

.q-answer strong { 
  color: #ffffff; 
  font-weight: 600; 
}

.q-answer ul, .q-answer ol { 
  padding-left: 22px; 
  margin: 10px 0 14px 0; 
}

.q-answer li { 
  margin-bottom: 8px; 
}

.q-answer table td {
  padding: 12px;
  border-color: var(--border-light) !important; /* Đè màu viền bảng trong Dark Mode */
  color: #e4e4e7;
}

/* Tags thi cử */
.exam-tag { 
  display: inline-flex; 
  align-items: center;
  font-family: var(--font-mono);
  font-size: 10px; 
  font-weight: 700; 
  padding: 3px 8px; 
  border-radius: var(--radius-sm); 
  margin-left: 10px; 
  background: var(--exam-bg); 
  color: var(--exam-text);
  border: 1px solid var(--exam-text);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  vertical-align: middle;
  /* Đổ bóng offset vuông vắn */
  box-shadow: -2px 2px 0 var(--exam-text);
}

/* Responsive adjustments */
@media (max-width: 600px) {
  .container { padding: 1.5rem 1rem; }
  .header { padding: 2rem 1.5rem; margin-bottom: 2rem; }
  .chapter-header { padding: 16px; gap: 12px; }
  .q-answer { padding-left: 20px; }
  .q-item:hover { transform: translateX(2px); box-shadow: -2px 0 0 var(--text-primary); }
  .chapter:hover { transform: translate(1px, -1px); }
}

/* Scroll Reveal Animation */
.reveal {
  opacity: 0;
  transform: translateY(40px);
  transition: opacity 0.7s ease-out, transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
  will-change: opacity, transform;
}
.reveal.visible {
  opacity: 1;
  transform: translateY(0);
}
</style>
</head>

function toggleAll(open) {
  document.querySelectorAll('.chapter-body').forEach(b => {
    b.classList.toggle('open', open);
  });
  document.querySelectorAll('.ch-arrow').forEach(a => {
    a.classList.toggle('open', open);
  });
}

function render() {
  const container = document.getElementById('chapters');
  data.forEach((chap, ci) => {
    const div = document.createElement('div');
    div.className = 'chapter reveal';

    const header = document.createElement('div');
    header.className = 'chapter-header';
    // Đã thay đổi icon mũi tên thành dạng hình vuông (square stroke) cho phù hợp style Techno
    header.innerHTML = `
      <span class="ch-badge" style="background:${chap.color};color:${chap.textColor}">Chương ${chap.ch}</span>
      <span class="ch-title">${chap.title}</span>
      <span class="ch-arrow" id="arr-${ci}">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"><path d="M9 18l6-6-6-6"/></svg>
      </span>
    `;
    header.onclick = () => {
      const body = document.getElementById('body-' + ci);
      body.classList.toggle('open');
      document.getElementById('arr-' + ci).classList.toggle('open');
    };

    const body = document.createElement('div');
    body.className = 'chapter-body';
    body.id = 'body-' + ci;

    let html = `<div class="section-label">Nội dung cần nắm</div><div class="key-content"><ul>`;
    chap.keys.forEach(k => { html += `<li>${k}</li>`; });
    html += `</ul></div><div class="section-label">Câu hỏi ôn tập</div>`;

    chap.qs.forEach((item, qi) => {
      const examTag = item.exam ? `<span class="exam-tag">Thi</span>` : '';
      html += `<div class="q-item">
        <div class="q-header" onclick="toggleQ('q-${ci}-${qi}')">
          <span class="q-num">[${qi+1}]</span>
          <span class="q-text">${item.q}${examTag}</span>
          <span class="q-toggle" id="qt-${ci}-${qi}">+</span>
        </div>
        <div class="q-answer" id="q-${ci}-${qi}">${item.a}</div>
      </div>`;
    });

    body.innerHTML = html;
    div.appendChild(header);
    div.appendChild(body);
    container.appendChild(div);
  });
}

function toggleQ(id) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
  const parts = id.split('-');
  const toggle = document.getElementById('qt-' + parts[1] + '-' + parts[2]);
  if (toggle) toggle.textContent = el.classList.contains('open') ? '−' : '+';
}

render();

// Scroll Reveal Observer Setup
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
      // Bỏ theo dõi sau khi đã hiện để hiệu ứng chỉ chạy 1 lần
      observer.unobserve(entry.target); 
    }
  });
}, {
  threshold: 0.1, // Kích hoạt khi 10% phần tử vào khung hình
  rootMargin: "0px 0px -30px 0px" // Kích hoạt sớm/muộn một chút so với viền dưới màn hình
});

// Thêm delay tuần tự (stagger effect) cho các phần tử xuất hiện ngay từ đầu
document.querySelectorAll('.reveal').forEach((el, index) => {
  if (index < 6) { // Chỉ áp dụng độ trễ cho vài thẻ đầu tiên
    el.style.transitionDelay = `${index * 0.08}s`;
  }
  observer.observe(el);
});

// Spotlight Effect Tracker (Vercel Style)
// Đoạn JS này sẽ lắng nghe con trỏ và cập nhật toạ độ sáng
document.addEventListener('mousemove', (e) => {
  document.querySelectorAll('.chapter, .q-item').forEach((card) => {
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    
    card.style.setProperty('--mouse-x', `${x}px`);
    card.style.setProperty('--mouse-y', `${y}px`);
  });
});
</script>
</body>
</html>
